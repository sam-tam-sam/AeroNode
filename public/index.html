<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Browser</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { background-color: #0f172a; color: #f8fafc; overflow: hidden; }
    .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    iframe { width: 100%; height: 100%; border: none; background: white; }
    .hidden-tab { display: none; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <!-- Topbar -->
  <header class="glass flex-none z-10 flex flex-col">
    <!-- Tab Bar -->
    <div class="flex items-center px-2 pt-2 gap-1 overflow-x-auto no-scrollbar" id="tab-bar">
      <!-- Tabs will be injected here -->
      <button id="new-tab-btn" class="p-1.5 hover:bg-slate-700 rounded-t-md text-slate-400 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      </button>
    </div>

    <!-- Address Bar row -->
    <div class="flex items-center gap-2 p-2 bg-slate-800">
      <div class="flex gap-1">
        <button id="btn-back" class="p-2 rounded hover:bg-slate-700 text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg></button>
        <button id="btn-forward" class="p-2 rounded hover:bg-slate-700 text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg></button>
        <button id="btn-refresh" class="p-2 rounded hover:bg-slate-700 text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg></button>
      </div>

      <form id="url-form" class="flex-1 flex">
        <div class="relative w-full flex items-center bg-slate-900 rounded-full border border-slate-700 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 overflow-hidden">
          <div class="pl-3 pr-2 py-2 text-slate-400 cursor-pointer hover:text-white" id="site-shield">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 1.944A11.954 11.954 0 012.166 5C2.056 5.649 2 6.319 2 7c0 5.225 3.34 9.67 8 11.317C14.66 16.67 18 12.225 18 7c0-.682-.057-1.35-.166-1.998A11.954 11.954 0 0110 1.944z" clip-rule="evenodd"></path></svg>
          </div>
          <input type="text" id="url-input" class="w-full bg-transparent border-none py-2 px-1 text-sm text-white focus:outline-none focus:ring-0" placeholder="Search or enter web address">
        </div>
      </form>

      <button id="btn-settings" class="p-2 rounded hover:bg-slate-700 text-slate-300 relative">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
    </div>
  </header>

  <!-- Main Viewport -->
  <main class="flex-1 relative bg-slate-900" id="webview-container">
    <!-- Iframes injected here -->
  </main>

  <!-- Download Overlay -->
  <div id="download-overlay" class="fixed bottom-4 right-4 w-80 bg-slate-800 rounded-lg shadow-xl border border-slate-700 hidden flex-col z-50 overflow-hidden">
    <div class="px-4 py-2 bg-slate-700 flex justify-between items-center">
      <span class="text-sm font-semibold">Downloads</span>
      <button id="close-downloads" class="text-slate-400 hover:text-white"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
    </div>
    <div id="download-list" class="max-h-48 overflow-y-auto p-2 space-y-2">
      <!-- Download items -->
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 backdrop-blur-sm">
    <div class="bg-slate-800 w-96 rounded-xl shadow-2xl border border-slate-700 p-6">
      <h2 class="text-xl font-bold mb-4">Browser Settings</h2>
      
      <div class="flex items-center justify-between mb-4">
        <span>Global AdBlock</span>
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" id="global-adblock" class="sr-only peer">
          <div class="w-11 h-6 bg-slate-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
        </label>
      </div>

      <div class="flex justify-end mt-6">
        <button id="close-settings" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded">Close</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>

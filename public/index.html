<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroNode Browser (Desktop)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 flex flex-col h-screen overflow-hidden font-inter select-none">

  <!-- Desktop Top Navigation Bar -->
  <div class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 px-4 py-2 flex items-center justify-between z-50 shadow-sm gap-4">
    
    <!-- Left: Navigation Controls -->
    <div class="flex items-center gap-1">
      <button id="btn-back" class="p-2 rounded-full text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Back">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <button id="btn-forward" class="p-2 rounded-full text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Forward">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      </button>
      <button id="btn-refresh" class="p-2 rounded-full text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Refresh">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
      </button>
      <button id="btn-home" class="p-2 rounded-full text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Home">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
      </button>
    </div>

    <!-- Center: Unified Search/URL Bar -->
    <form id="url-form" class="flex-1 max-w-3xl relative flex items-center group">
      <input type="text" id="url-input" class="w-full bg-gray-100 dark:bg-gray-800 border border-transparent group-hover:border-gray-300 dark:group-hover:border-gray-700 rounded-full py-2 pl-6 pr-10 text-sm shadow-inner focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-gray-900 dark:text-gray-100" placeholder="Search Google or enter a URL..." autocomplete="off" spellcheck="false">
      <button type="button" id="btn-bookmark-current" class="absolute right-3 p-1 text-gray-400 hover:text-yellow-500 transition-colors" title="Bookmark this page">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
      </button>
    </form>

    <!-- Right: Browser Menus -->
    <div class="flex items-center gap-1">
      <button id="btn-bookmarks" class="p-2 rounded-full text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="Bookmarks">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
      </button>
      <button id="btn-history" class="p-2 rounded-full text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" title="History">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </button>
    </div>
  </div>

  <!-- Main Content Area -->
  <div id="webview-container" class="flex-1 relative bg-white dark:bg-gray-900 w-full flex flex-col">
    
    <!-- Home Page Overlay -->
    <div id="home-screen" class="absolute inset-0 flex flex-col items-center pt-[15vh] px-6 bg-gray-50 dark:bg-gray-900 z-10 overflow-y-auto hidden">
      <div class="mb-12 flex flex-col items-center select-none cursor-default">
        <div class="w-24 h-24 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-3xl flex items-center justify-center shadow-2xl mb-4 transform hover:scale-105 transition-transform">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
        <h1 class="text-3xl font-semibold tracking-wide text-gray-800 dark:text-gray-100">AeroNode</h1>
        <p class="text-sm text-gray-500 mt-2">Remote Browser Isolation</p>
      </div>
    </div>

    <!-- Main Browser Viewport (noVNC Canvas) -->
    <div class="flex-1 relative">
      <div id="vnc-container" class="w-full h-full overflow-hidden flex justify-center items-center bg-gray-900 absolute inset-0">
        <div id="vnc-status" class="text-white text-sm absolute z-10 font-mono tracking-widest uppercase">Connecting to GTK Engine...</div>
      </div>
    </div>
  </div>

  <!-- Shared Side Panel / Modal for Lists -->
  <div id="side-panel-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden justify-end">
    <div id="side-panel" class="bg-white dark:bg-gray-900 w-96 h-full shadow-2xl flex flex-col transform transition-transform translate-x-full border-l border-gray-200 dark:border-gray-800">
      <div class="flex justify-between items-center p-4 border-b border-gray-200 dark:border-gray-800">
        <h2 id="side-panel-title" class="text-lg font-semibold">Menu</h2>
        <div class="flex gap-2">
          <button id="close-side-panel" class="text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 p-2 rounded-full transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
      </div>
      <div id="side-panel-list" class="flex-1 overflow-y-auto p-4 space-y-2">
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>

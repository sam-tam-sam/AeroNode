<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Credentials Needed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0f172a; color: #f8fafc; }
  </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-white mb-2">AeroNode Browser</h1>
      <p class="text-slate-400">Credentials needed to access the interface</p>
    </div>
    
    <form id="loginForm" class="space-y-6">
      <div>
        <label for="password" class="block text-sm font-medium text-slate-300">Password</label>
        <div class="mt-1">
          <input id="password" name="password" type="password" required 
            class="appearance-none block w-full px-3 py-2 border border-slate-600 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm bg-slate-900 text-white">
        </div>
      </div>

      <div id="error" class="text-red-400 text-sm hidden">Invalid password. Please try again.</div>

      <div>
        <button type="submit" 
          class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-slate-900 transition-colors">
          Connect
        </button>
      </div>
    </form>
  </div>

  <script src="/login.js"></script>
</body>
</html>
